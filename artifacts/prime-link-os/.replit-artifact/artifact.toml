kind = "web"
previewPath = "/"
title = "Prime Link OS"
version = "1.0.0"
id = "artifacts/prime-link-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25019

[services.development]
run = "pnpm --filter @workspace/prime-link-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prime-link-os", "run", "build" ]
publicDir = "artifacts/prime-link-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25019"
BASE_PATH = "/"
